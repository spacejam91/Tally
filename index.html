/* ---- recently deleted (trash) ---- */
function openTrashSheet(){
  const reopen=()=>{ [...document.querySelectorAll('.scrim')].forEach(x=>x.remove()); openTrashSheet(); };
  const entries=Object.values(state.trash).sort((a,b)=>(b.deletedAt||0)-(a.deletedAt||0));
  const fields=[];
  if(!entries.length){
    fields.push(h('div',{class:'empty'}, h('div',{class:'big'},'🗑️'), h('p',{},'Nothing here. Deleted items stay restorable for 30 days.')));
  } else {
    fields.push(h('div',{class:'banner',html:icon(ICONS.info)+' <span>Deleted items can be restored for 30 days, then they\'re removed for good.</span>'}));
    entries.forEach(e=>{
      const isSettle=e.type==='settlement';
      const c=isSettle?null:catOf(e.category);
      const left=Math.max(0, 30-Math.floor((Date.now()-(e.deletedAt||0))/86400000));
      fields.push(h('div',{class:'bud-row'},
        h('div',{class:'nm'}, h('span',{},isSettle?'🤝':c.em),
          h('div',{},
            h('div',{}, isSettle?'Settle up':(e.description||c.label)),
            h('div',{style:{fontSize:'11.5px',color:'var(--muted-txt)',fontWeight:'500'}}, money(e.amount)+' · '+fmtDate(e.date)+' · gone in '+left+'d'))),
        h('div',{style:{display:'flex',gap:'8px',flex:'none'}},
          h('button',{class:'btn btn-forest btn-sm',type:'button',onclick:async()=>{ await restoreFromTrash(e.id); reopen(); }},'Restore'),
          h('button',{class:'btn btn-danger btn-sm',type:'button',onclick:async()=>{ if(confirm('Delete forever? This one can\'t be undone.')){ await purgeTrashEntry(e.id); reopen(); } },html:icon(ICONS.trash)}))));
    });
  }
  buildSheet('Recently deleted', fields, async()=>true);
}

/* ---- PIN lock (per device) ---- */
async function pinHash(salt, pin){
  try{
    const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(salt+'|'+pin));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){ // non-secure-context fallback
    let hh=5381; const s=salt+'|'+pin;
    for(let i=0;i<s.length;i++){ hh=((hh<<5)+hh+s.charCodeAt(i))>>>0; }
    return 'djb2:'+hh.toString(16);
  }
}
function showLock(){
  if(!config||!config.pin||document.querySelector('.lock')) return;
  const inp=h('input',{class:'input pin',type:'password',inputmode:'numeric',autocomplete:'off',maxlength:'8',placeholder:'••••'});
  const box=h('div',{class:'lockbox'});
  async function tryUnlock(){
    const hv=await pinHash(config.pin.salt, inp.value.trim());
    if(hv===config.pin.hash){ ov.remove(); }
    else{ inp.value=''; box.classList.add('shake'); setTimeout(()=>box.classList.remove('shake'),450); toast('Wrong PIN'); inp.focus(); }
  }
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') tryUnlock(); });
  box.append(
    h('div',{class:'mark'},'◑'),
    h('h2',{},'Enter PIN'),
    inp,
    h('button',{class:'btn btn-primary',style:{width:'100%'},onclick:tryUnlock},'Unlock'),
    h('button',{class:'forgot',onclick:()=>{
      if(confirm('Forgot your PIN?\n\nThis resets Tally on THIS device so you can set it up again. Cloud-synced data is safe; local-only data on this device would be lost.')){
        localStorage.removeItem(CFG_KEY); localStorage.removeItem(LOCAL_DATA_KEY); localStorage.removeItem(LOCAL_RCPT_KEY);
        location.reload();
      }
    }},'Forgot PIN?')
  );
  const ov=h('div',{class:'lock'}, box);
  document.body.append(ov);
  setTimeout(()=>inp.focus(),60);
}
function openPinSheet(){
  if(config.pin){
    const cur=h('input',{class:'input pin',type:'password',inputmode:'numeric',maxlength:'8',placeholder:'Current PIN'});
    buildSheet('App lock', [
      h('div',{class:'banner',html:icon(ICONS.info)+' <span>A PIN is set on this device. Enter it and Save to turn the lock off.</span>'}),
      h('div',{class:'field'}, h('label',{},'Current PIN'), cur)
    ], async()=>{
      const hv=await pinHash(config.pin.salt, cur.value.trim());
      if(hv!==config.pin.hash){ toast('Wrong PIN'); return false; }
      delete config.pin; saveConfig(); toast('App lock turned off'); render(); return true;
    });
  } else {
    const p1=h('input',{class:'input pin',type:'password',inputmode:'numeric',maxlength:'8',placeholder:'4–8 digits'});
    const p2=h('input',{class:'input pin',type:'password',inputmode:'numeric',maxlength:'8',placeholder:'Repeat PIN'});
    buildSheet('Set app lock', [
      h('div',{class:'banner',html:icon(ICONS.info)+' <span>Tally will ask for this PIN when it opens on this device (set it separately on each phone). If you forget it you\'ll need to reset the device — cloud-synced data stays safe.</span>'}),
      h('div',{class:'field'}, h('label',{},'New PIN'), p1),
      h('div',{class:'field'}, h('label',{},'Repeat PIN'), p2)
    ], async()=>{
      const a=p1.value.trim(), b=p2.value.trim();
      if(!/^\d{4,8}$/.test(a)){ toast('PIN must be 4–8 digits.'); return false; }
      if(a!==b){ toast('PINs don\'t match.'); return false; }
      const salt=rid();
      config.pin={salt, hash:await pinHash(salt,a)};
      saveConfig(); toast('App lock on'); render(); return true;
    });
  }
}

/* ---- view / copy / change the shared household code ---- */
function openHouseholdSheet(){
  const current = config.firebase.household;
  const partner = memberName(otherId(config.deviceMemberId));
  const inp=h('input',{class:'input',value:current,autocapitalize:'off',autocorrect:'off',spellcheck:'false',style:{fontFamily:'var(--mono)'}});
  const copyBtn=h('button',{class:'btn btn-ghost',type:'button',style:{width:'100%'},onclick:async()=>{
    const code=normHousehold(inp.value);
    try{ await navigator.clipboard.writeText(code); toast('Code copied — send it to '+partner); }
    catch(e){ inp.focus(); inp.select(); toast('Press and hold to copy the code'); }
  }}, h('span',{html:icon(ICONS.clip)}),'Copy code');
  buildSheet('Household code', [
    h('div',{class:'banner',html:icon(ICONS.info)+' <span>This is the shared key to your data. You and '+escapeHtml(partner)+' must use the <b>same code</b> (capitalization doesn\'t matter). Changing it points <b>this device</b> at a different shared space — so change it on both phones together.</span>'}),
    h('div',{class:'field'}, h('label',{},'Code'), inp),
    copyBtn
  ], async()=>{
    const code=normHousehold(inp.value);
    if(code.length<6){ toast('Use at least 6 characters.'); return false; }
    if(code===current){ return true; }
    if(!confirm('Point this device at household “'+code+'”?\n\nMake sure '+partner+' uses the same code, or you\'ll be in separate spaces.')) return false;
    config.firebase.household=code; saveConfig();
    toast('Reconnecting…');
    try{ await cloudConnect(); render(); toast('Household code updated'); }
    catch(e){ toast('Couldn\'t reconnect — double-check the code.'); }
    return true;
  });
}

/* ================================================================
   EXPENSE SHEET (add / edit)
   ================================================================ */
function openExpenseSheet(existing){
  const editing=!!existing;
  const ms=members();
  const meId=config.deviceMemberId;
  const data = existing ? JSON.parse(JSON.stringify(existing)) : {
    id:'tx_'+rid(), type:'expense', description:'', amount:0, category:'groceries',
    date:todayStr(), paidBy:meId, split:{type:'equal'}, hasReceipt:false, thumb:null,
    createdBy:meId, createdAt:Date.now()
  };
  let newReceipt=undefined;   // undefined=untouched, null=removed, string=new full
  let existingThumb = data.thumb||null;

  const amountI=h('input',{class:'input',type:'text',inputmode:'decimal',placeholder:'0.00',value:data.amount?String(data.amount):''});
  const descI=h('input',{class:'input',placeholder:'What was it for?',value:data.description||''});
  const dateI=h('input',{class:'input',type:'date',value:data.date});

  // category chips
  const catWrap=h('div',{class:'chips'});
  function paintCats(){ [...catWrap.children].forEach((ch,idx)=>ch.className='chip'+(CATEGORIES[idx].k===data.category?' on':'')); }
  CATEGORIES.forEach(c=>catWrap.append(h('button',{class:'chip',type:'button',onclick:()=>{data.category=c.k;paintCats();}}, h('span',{class:'em'},c.em), c.label)));
  paintCats();

  // payer
  const payerWrap=h('div',{class:'payer'});
  function paintPayer(){ [...payerWrap.children].forEach((b,idx)=>b.className=(ms[idx].id===data.paidBy?'on':'')); }
  ms.forEach((m,i)=>payerWrap.append(h('button',{type:'button',onclick:()=>{data.paidBy=m.id; paintPayer(); paintSplit();}},
    h('span',{class:'av',style:{background:AV_COLORS[i]}}, initials(m.name)), (m.id===meId?'You':m.name))));
  paintPayer();

  // split
  if(!data.split) data.split={type:'equal'};
  const splitSeg=h('div',{class:'seg clay'});
  const SPLITS=[['equal','Equal'],['ratio','Ratio'],['exact','Exact'],['full','One pays']];
  SPLITS.forEach(([k,l])=>splitSeg.append(h('button',{type:'button',class:(data.split.type===k?'on':''),onclick:()=>{data.split.type=k;paintSplit();}},l)));
  const splitBody=h('div',{style:{marginTop:'12px'}});
  const splitHint=h('div',{class:'split-hint'});

  function curAmount(){ return parseAmount(amountI.value)||0; }
  function paintSplit(){
    [...splitSeg.children].forEach((b,idx)=>b.className=(SPLITS[idx][0]===data.split.type?'on':''));
    splitBody.innerHTML=''; splitHint.textContent=''; splitHint.className='split-hint';
    const amt=curAmount();
    if(data.split.type==='equal'){
      const sh=computeShares(amt,{type:'equal'},data.paidBy);
      splitBody.append(h('div',{class:'split-box'},
        ...ms.map(m=>h('div',{class:'split-row'}, h('div',{class:'nm'}, m.id===meId?'You':m.name), h('div',{class:'mono'}, money(sh[m.id]))))));
      splitHint.textContent='Split evenly, 50 / 50';
    } else if(data.split.type==='full'){
      if(!data.split.owedBy) data.split.owedBy=otherId(data.paidBy);
      const box=h('div',{class:'split-box'});
      box.append(h('div',{style:{fontSize:'13px',color:'var(--muted-txt)',marginBottom:'10px'}},'Who is this expense fully for?'));
      const pk=h('div',{class:'payer'});
      ms.forEach((m,i)=>pk.append(h('button',{type:'button',class:(data.split.owedBy===m.id?'on':''),onclick:()=>{data.split.owedBy=m.id;paintSplit();}},
        h('span',{class:'av',style:{background:AV_COLORS[i]}},initials(m.name)), (m.id===meId?'You':m.name))));
      box.append(pk); splitBody.append(box);
      if(data.split.owedBy===data.paidBy){
        splitHint.textContent='⚠ '+memberName(data.split.owedBy)+' pays AND owes it — nothing will be owed to anyone.';
        splitHint.className='split-hint bad';
      } else splitHint.textContent=memberName(data.split.owedBy)+' owes the full '+money(amt);
    } else if(data.split.type==='ratio'){
      if(!data.split.weights) data.split.weights={m1:50,m2:50};
      const w=data.split.weights;
      const range=h('input',{type:'range',min:'0',max:'100',step:'5',value:String(w.m1)});
      const legend=h('div',{class:'ratio-legend'});
      const sh=()=>computeShares(amt,{type:'ratio',weights:w},data.paidBy);
      function relabel(){ const s=sh();
        legend.innerHTML='';
        legend.append(h('span',{}, (ms[0].id===meId?'You':ms[0].name)+' '+w.m1+'% · '+money(s.m1)),
                      h('span',{}, (ms[1].id===meId?'You':ms[1].name)+' '+w.m2+'% · '+money(s.m2)));
        const payerW = data.paidBy===ms[0].id ? w.m1 : w.m2;
        if(payerW>=100){
          splitHint.textContent='⚠ '+(data.paidBy===meId?'You pay and cover':memberName(data.paidBy)+' pays and covers')+' the whole thing — nothing will be owed. Slide toward '+memberName(otherId(data.paidBy))+' to split it.';
          splitHint.className='split-hint bad';
        } else { splitHint.textContent=''; splitHint.className='split-hint'; }
      }
      range.addEventListener('input',()=>{ w.m1=Number(range.value); w.m2=100-w.m1; relabel(); });
      relabel();
      splitBody.append(h('div',{class:'split-box'}, h('div',{class:'slider-wrap'}, range), legend));
    } else if(data.split.type==='exact'){
      if(!data.split.exact) data.split.exact={m1:'',m2:''};
      const box=h('div',{class:'split-box'});
      const inputs={};
      ms.forEach(m=>{
        const inp=h('input',{class:'input',type:'text',inputmode:'decimal',placeholder:'0.00',value:(data.split.exact[m.id]??'')});
        inputs[m.id]=inp;
        inp.addEventListener('input',()=>{ data.split.exact[m.id]=inp.value; checkExact(); });
        box.append(h('div',{class:'split-row'}, h('div',{class:'nm'}, m.id===meId?'You':m.name), h('div',{class:'in'}, inp)));
      });
      splitBody.append(box);
      function checkExact(){
        const sum=ms.reduce((a,m)=>a+(parseAmount(data.split.exact[m.id])||0),0);
        const diff=amt-sum;
        if(Math.abs(toC(sum)-toC(amt))===0){ splitHint.textContent='Adds up to '+money(amt)+' ✓'; splitHint.className='split-hint'; }
        else { splitHint.textContent=(diff>0?money(diff)+' left to assign':money(-diff)+' over'); splitHint.className='split-hint bad'; }
      }
      checkExact();
    }
    splitBody.append(splitHint);
  }
  amountI.addEventListener('input',()=>paintSplit());

  // receipt
  const fileI=h('input',{type:'file',accept:'image/*',capture:'environment',style:{display:'none'}});
  const receiptZone=h('div',{});
  function paintReceipt(){
    receiptZone.innerHTML='';
    const showThumb = newReceipt!==null && (newReceipt || existingThumb || (editing&&data.hasReceipt));
    if(newReceipt){ // freshly attached (full data url available as thumb-ish)
      receiptZone.append(thumbNode(newReceipt));
    } else if(showThumb && (existingThumb || data.hasReceipt)){
      receiptZone.append(thumbNode(existingThumb||null, data.id));
    } else {
      receiptZone.append(h('div',{class:'receipt-drop',onclick:()=>fileI.click()},
        h('span',{html:icon(ICONS.cam)}), h('div',{class:'txt'}, h('b',{},'Add receipt photo'), h('span',{},'Snap or upload — auto-compressed'))));
    }
  }
  function thumbNode(src, txnId){
    const wrap=h('div',{class:'receipt-thumb'});
    const img=h('img',{alt:'receipt'});
    if(src) img.src=src;
    else if(txnId){ img.src=''; fetchReceipt(txnId).then(d=>{ if(d) img.src=d; else img.replaceWith(h('div',{style:{padding:'20px',textAlign:'center',color:'var(--muted-txt)'}},'📎 Receipt attached')); }); }
    wrap.append(img);
    wrap.append(h('button',{class:'rm',type:'button',onclick:(e)=>{e.stopPropagation(); newReceipt=null; existingThumb=null; data.hasReceipt=false; data.thumb=null; paintReceipt();}, html:icon(ICONS.x)}));
    wrap.addEventListener('click',()=>{ const s=img.getAttribute('src'); if(s) openViewer(s); });
    return wrap;
  }
  fileI.addEventListener('change',async()=>{
    const f=fileI.files[0]; if(!f) return;
    toast('Compressing photo…');
    try{ const {thumb,full}=await processReceipt(f); newReceipt=full; existingThumb=thumb; data.thumb=thumb; data.hasReceipt=true; paintReceipt(); }
    catch(e){ toast('Couldn\'t read that image.'); }
  });
  paintReceipt();
  paintSplit();

  // per-expense paid-back marking (creates a linked settlement so the balance stays honest)
  const paidBackZone=h('div',{class:editing?'field':'hide'});
  function paintPaidBack(){
    paidBackZone.innerHTML='';
    if(!editing) return;
    const t=state.transactions[data.id]; if(!t||t.type!=='expense') return;
    const sh=t.shares||computeShares(t.amount,t.split,t.paidBy);
    const ower=otherId(t.paidBy), owed=Math.round((sh[ower]||0)*100)/100;
    const pb=t.paidBackId && state.transactions[t.paidBackId];
    if(pb){
      paidBackZone.append(h('button',{class:'btn btn-ghost',type:'button',style:{width:'100%'},onclick:async()=>{
        const sid=t.paidBackId; delete t.paidBackId; t.updatedAt=Date.now();
        await persistTransaction(t);
        if(state.transactions[sid]) await removeTransaction(sid);
        delete data.paidBackId; toast('Paid-back undone'); paintPaidBack();
      }},'✓ Paid back — tap to undo'));
    } else if(owed>0.005){
      paidBackZone.append(h('button',{class:'btn btn-forest',type:'button',style:{width:'100%'},onclick:async()=>{
        const st={id:'st_'+rid(),type:'settlement',from:ower,to:t.paidBy,amount:owed,date:todayStr(),
          note:'Paid back: '+(t.description||catOf(t.category).label),forTxn:t.id,createdBy:config.deviceMemberId,createdAt:Date.now()};
        await persistTransaction(st);
        t.paidBackId=st.id; t.updatedAt=Date.now();
        await persistTransaction(t);
        data.paidBackId=st.id; toast('Marked paid back ✓'); paintPaidBack();
      }}, h('span',{html:icon(ICONS.check)}), 'Mark paid back — '+memberName(ower)+' paid '+money(owed)));
    }
  }
  paintPaidBack();
  const sheet=buildSheet(editing?'Edit expense':'Add expense', [
    h('div',{class:'field amount-field'}, h('label',{},'Amount'), h('span',{class:'cur'},'$'), amountI),
    h('div',{class:'field'}, h('label',{},'Description'), descI),
    h('div',{class:'row2'},
      h('div',{class:'field'}, h('label',{},'Date'), dateI),
      h('div',{class:'field'}, h('label',{},'Paid by'), payerWrap)),
    h('div',{class:'field'}, h('label',{},'Category'), catWrap),
    h('div',{class:'field'}, h('label',{},'Split'), splitSeg, splitBody),
    h('div',{class:'field'}, h('label',{},'Receipt'), fileI, receiptZone),
    paidBackZone,
  ], async()=>{
    const amt=parseAmount(amountI.value);
    if(!amt||amt<=0){ toast('Enter an amount greater than 0.'); return false; }
    if(data.split.type==='exact'){
      const amtC=toC(amt);
      const sumC=ms.reduce((a,m)=>a+toC(parseAmount(data.split.exact?.[m.id])||0),0);
      if(sumC!==amtC){ toast('Exact split must add up to '+money(amt)+'.'); return false; }
      data.split.exact={m1:parseAmount(data.split.exact.m1)||0, m2:parseAmount(data.split.exact.m2)||0};
    }
    data.amount=Math.round(amt*100)/100;
    data.description=descI.value.trim();
    data.date=dateI.value||todayStr();
    data.shares=computeShares(data.amount, data.split, data.paidBy);
    data.updatedAt=Date.now();
    await persistTransaction(data, newReceipt);
    toast(editing?'Saved':'Expense added');
    return true;
  }, editing?async()=>{
    await removeTransaction(data.id);
    toastUndo('Expense deleted', ()=>restoreFromTrash(data.id));
    return true;
  }:null);
}

/* ================================================================
   SETTLE UP sheet
   ================================================================ */
function openSettleSheet(existing){
  const editing=!!existing;
  const ms=members();
  const meId=config.deviceMemberId;
  const bal=computeBalances();
  // default: whoever owes pays the other the outstanding amount
  let defFrom=meId, defTo=otherId(meId), defAmt=0;
  if(bal[meId]<-0.005){ defFrom=meId; defTo=otherId(meId); defAmt=-bal[meId]; }
  else if(bal[meId]>0.005){ defFrom=otherId(meId); defTo=meId; defAmt=bal[meId]; }
  const data = existing ? JSON.parse(JSON.stringify(existing)) : {
    id:'st_'+rid(), type:'settlement', from:defFrom, to:defTo,
    amount:Math.round(defAmt*100)/100, date:todayStr(), note:'', createdBy:meId, createdAt:Date.now()
  };
  const amountI=h('input',{class:'input',type:'text',inputmode:'decimal',value:data.amount?String(data.amount):''});
  const dateI=h('input',{class:'input',type:'date',value:data.date});
  const noteI=h('input',{class:'input',placeholder:'e.g. e-transfer',value:data.note||''});

  const dir=h('div',{class:'split-box',style:{textAlign:'center'}});
  function paintDir(){
    dir.innerHTML='';
    dir.append(
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',flexWrap:'wrap'}},
        h('b',{}, data.from===meId?'You':memberName(data.from)),
        h('span',{html:icon(ICONS.right),style:{color:'var(--forest)'}}),
        h('span',{style:{fontFamily:'var(--serif)',fontSize:'18px'}}, 'pays'),
        h('span',{html:icon(ICONS.right),style:{color:'var(--forest)'}}),
        h('b',{}, data.to===meId?'You':memberName(data.to))),
      h('button',{class:'btn btn-ghost btn-sm',type:'button',style:{marginTop:'12px'},onclick:()=>{const f=data.from;data.from=data.to;data.to=f;paintDir();}},
        h('span',{html:icon(ICONS.swap)}),'Switch direction')
    );
  }
  paintDir();

  buildSheet(editing?'Edit payment':'Settle up', [
    h('div',{class:'field'}, h('label',{},'Payment'), dir),
    h('div',{class:'field amount-field'}, h('label',{},'Amount'), h('span',{class:'cur'},'$'), amountI),
    h('div',{class:'row2'},
      h('div',{class:'field'}, h('label',{},'Date'), dateI),
      h('div',{class:'field'}, h('label',{},'Note'), noteI)),
  ], async()=>{
    const amt=parseAmount(amountI.value);
    if(!amt||amt<=0){ toast('Enter the amount paid.'); return false; }
    data.amount=Math.round(amt*100)/100; data.date=dateI.value||todayStr(); data.note=noteI.value.trim(); data.updatedAt=Date.now();
    await persistTransaction(data);
    toast('Payment recorded');
    return true;
  }, editing?async()=>{
    await removeTransaction(data.id);
    toastUndo('Payment deleted', ()=>restoreFromTrash(data.id));
    return true;
  }:null);
}

/* ================================================================
   RECURRING sheet
   ================================================================ */
function openRecurringSheet(existing){
  const editing=!!existing;
  const ms=members(); const meId=config.deviceMemberId;
  const data=existing?JSON.parse(JSON.stringify(existing)):{
    id:'rc_'+rid(), description:'', amount:0, category:'rent', paidBy:meId,
    split:{type:'equal'}, dayOfMonth:1, startDate:todayStr().slice(0,8)+'01', active:true, createdAt:Date.now()
  };
  const descI=h('input',{class:'input',placeholder:'e.g. Rent, Netflix',value:data.description||''});
  const amountI=h('input',{class:'input',type:'text',inputmode:'decimal',value:data.amount?String(data.amount):''});
  const dayI=h('input',{class:'input',type:'number',min:'1',max:'31',value:String(data.dayOfMonth||1)});
  const startI=h('input',{class:'input',type:'date',value:data.startDate});

  const catWrap=h('div',{class:'chips'});
  CATEGORIES.forEach(c=>catWrap.append(h('button',{type:'button',class:'chip'+(c.k===data.category?' on':''),onclick:()=>{data.category=c.k;[...catWrap.children].forEach((ch,idx)=>ch.className='chip'+(CATEGORIES[idx].k===data.category?' on':''));}}, h('span',{class:'em'},c.em), c.label)));

  const payerWrap=h('div',{class:'payer'});
  ms.forEach((m,i)=>payerWrap.append(h('button',{type:'button',class:(m.id===data.paidBy?'on':''),onclick:()=>{data.paidBy=m.id;[...payerWrap.children].forEach((b,idx)=>b.className=(ms[idx].id===data.paidBy?'on':''));}},
    h('span',{class:'av',style:{background:AV_COLORS[i]}},initials(m.name)), (m.id===meId?'You':m.name))));

  const splitSeg=h('div',{class:'seg clay'});
  const SP=[['equal','Equal'],['ratio','Ratio'],['full','One pays']];
  SP.forEach(([k,l])=>splitSeg.append(h('button',{type:'button',class:(data.split.type===k?'on':''),onclick:()=>{data.split.type=k; if(k==='ratio'&&!data.split.weights)data.split.weights={m1:50,m2:50}; if(k==='full'&&!data.split.owedBy)data.split.owedBy=otherId(data.paidBy); [...splitSeg.children].forEach((b,idx)=>b.className=(SP[idx][0]===data.split.type?'on':'')); paintRSplit();}},l)));
  const rSplitBody=h('div',{style:{marginTop:'10px'}});
  function paintRSplit(){
    rSplitBody.innerHTML='';
    if(data.split.type==='ratio'){
      const w=data.split.weights||(data.split.weights={m1:50,m2:50});
      const range=h('input',{type:'range',min:'0',max:'100',step:'5',value:String(w.m1)});
      const legend=h('div',{class:'ratio-legend'});
      function rl(){legend.innerHTML='';legend.append(h('span',{},ms[0].name+' '+w.m1+'%'),h('span',{},ms[1].name+' '+w.m2+'%'));}
      range.addEventListener('input',()=>{w.m1=Number(range.value);w.m2=100-w.m1;rl();}); rl();
      rSplitBody.append(h('div',{class:'split-box'},h('div',{class:'slider-wrap'},range),legend));
    } else if(data.split.type==='full'){
      if(!data.split.owedBy)data.split.owedBy=otherId(data.paidBy);
      const pk=h('div',{class:'payer'});
      ms.forEach((m,i)=>pk.append(h('button',{type:'button',class:(data.split.owedBy===m.id?'on':''),onclick:()=>{data.split.owedBy=m.id;[...pk.children].forEach((b,idx)=>b.className=(ms[idx].id===data.split.owedBy?'on':''));}},
        h('span',{class:'av',style:{background:AV_COLORS[i]}},initials(m.name)),(m.id===meId?'You':m.name))));
      rSplitBody.append(h('div',{class:'split-box'},h('div',{style:{fontSize:'13px',color:'var(--muted-txt)',marginBottom:'8px'}},'Owed entirely by:'),pk));
    }
  }
  paintRSplit();

  buildSheet(editing?'Edit recurring bill':'New recurring bill',[
    h('div',{class:'field'}, h('label',{},'Description'), descI),
    h('div',{class:'field amount-field'}, h('label',{},'Amount'), h('span',{class:'cur'},'$'), amountI),
    h('div',{class:'row2'},
      h('div',{class:'field'}, h('label',{},'Day of month'), dayI),
      h('div',{class:'field'}, h('label',{},'Starting'), startI)),
    h('div',{style:{fontSize:'12px',color:'var(--muted-txt)',margin:'-8px 2px 14px'}},'Use 31 for the last day — it falls back in shorter months (Feb → 28/29).'),
    h('div',{class:'field'}, h('label',{},'Category'), catWrap),
    h('div',{class:'field'}, h('label',{},'Paid by'), payerWrap),
    h('div',{class:'field'}, h('label',{},'Split'), splitSeg, rSplitBody),
  ], async()=>{
    const amt=parseAmount(amountI.value);
    if(!data.description.trim() && !descI.value.trim()){ toast('Give it a name.'); return false; }
    if(!amt||amt<=0){ toast('Enter an amount.'); return false; }
    data.description=descI.value.trim(); data.amount=Math.round(amt*100)/100;
    data.dayOfMonth=clampDom(dayI.value);
    data.startDate=startI.value||todayStr();
    await persistRecurring(data);
    generateRecurring(); render();
    toast(editing?'Saved':'Recurring bill added');
    return true;
  }, editing?async()=>{
    const snapshot=JSON.parse(JSON.stringify(state.recurring[data.id]||data));
    await removeRecurring(data.id);
    toastUndo('Recurring bill deleted (logged expenses stay)', ()=>persistRecurring(snapshot));
    return true;
  }:null);
}

/* ================================================================
   generic bottom-sheet builder
   ================================================================ */
function buildSheet(title, fields, onSave, onDelete){
  const scrim=h('div',{class:'scrim',onclick:(e)=>{ if(e.target===scrim) close(); }});
  const saveBtn=h('button',{class:'btn btn-primary',style:{flex:'2'}}, 'Save');
  saveBtn.addEventListener('click', async()=>{
    saveBtn.disabled=true;
    let ok=false;
    try{ ok=await onSave(); }
    catch(err){ console.error(err); toast('Couldn\'t save — '+((err&&err.message)||'please try again')); }
    if(ok) close(); else saveBtn.disabled=false;
  });
  const footer=h('div',{style:{display:'flex',gap:'10px',marginTop:'18px'}},
    onDelete?h('button',{class:'btn btn-danger',onclick:async()=>{ try{ if(await onDelete()) close(); }catch(err){ console.error(err); toast('Couldn\'t delete — try again'); } }, html:icon(ICONS.trash)}):null,
    saveBtn);
  const sheet=h('div',{class:'sheet'},
    h('div',{class:'grip'}),
    h('div',{class:'sheet-head'}, h('h2',{},title),
      h('button',{class:'x',onclick:()=>close(),html:icon(ICONS.x)})),
    ...fields, footer);
  scrim.append(sheet);
  document.body.append(scrim);
  function close(){ scrim.style.animation='fade .18s reverse'; setTimeout(()=>scrim.remove(),160); }
  scrim._close=close;
  return scrim;
}

/* ================================================================
   export / import
   ================================================================ */
async function exportData(){
  // include receipts inline for a complete backup
  const receipts={};
  for(const t of Object.values(state.transactions)){
    if(t.hasReceipt||t.thumb){ const d=await fetchReceipt(t.id); if(d) receipts[t.id]=d; }
  }
  const payload={ app:'tally', version:1, exportedAt:new Date().toISOString(),
    meta:{members:config.members,currency:config.currency}, transactions:state.transactions, recurring:state.recurring, skipRecurring:state.skipRecurring, receipts };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=h('a',{href:URL.createObjectURL(blob),download:'tally-backup-'+todayStr()+'.json'}); a.click();
  toast('Backup downloaded');
}
function exportCSV(){
  const ms=members();
  const esc=v=>{ v=(v==null?'':String(v)); return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const header=['Date','Type','Description','Category','Paid by','To','Amount',ms[0].name+' share',ms[1].name+' share','Note'];
  const rows=[header];
  Object.values(state.transactions).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(t=>{
    if(t.type==='settlement'){
      rows.push([t.date,'Settlement','Settle up','',memberName(t.from),memberName(t.to),(t.amount||0).toFixed(2),'','',t.note||'']);
    } else {
      const sh=t.shares||computeShares(t.amount,t.split,t.paidBy);
      rows.push([t.date,'Expense',t.description||'',catOf(t.category).label,memberName(t.paidBy),'',(t.amount||0).toFixed(2),(sh[ms[0].id]||0).toFixed(2),(sh[ms[1].id]||0).toFixed(2),t.note||'']);
    }
  });
  const csv=rows.map(r=>r.map(esc).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});   // BOM so Excel reads UTF-8
  const a=h('a',{href:URL.createObjectURL(blob),download:'tally-'+todayStr()+'.csv'}); a.click();
  toast('CSV downloaded');
}
/* calendar (.ics) of recurring bills — native phone-calendar alerts, no server needed */
function exportICS(){
  const bills=Object.values(state.recurring).filter(t=>t.active);
  if(!bills.length){ toast('Add a recurring bill first.'); return; }
  const pad=n=>String(n).padStart(2,'0');
  const esc=s=>String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,');
  const now=new Date();
  const stamp=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}T${pad(now.getHours())}${pad(now.getMinutes())}00`;
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Tally//bills//EN','CALSCALE:GREGORIAN','X-WR-CALNAME:Tally bills'];
  const today0=new Date(); today0.setHours(0,0,0,0);
  bills.forEach(t=>{
    // first occurrence: today or later, respecting startDate
    let y=today0.getFullYear(), m0=today0.getMonth();
    const sd=t.startDate?new Date(t.startDate+'T00:00:00'):null;
    if(sd && sd>today0){ y=sd.getFullYear(); m0=sd.getMonth(); }
    let first=new Date(y, m0, domInMonth(t.dayOfMonth,y,m0));
    if(first<today0 || (sd&&first<sd)){ m0++; if(m0>11){m0=0;y++;} first=new Date(y, m0, domInMonth(t.dayOfMonth,y,m0)); }
    const d=clampDom(t.dayOfMonth);
    const rrule = d<=28 ? `FREQ=MONTHLY;BYMONTHDAY=${d}`
      : `FREQ=MONTHLY;BYMONTHDAY=${Array.from({length:d-27},(_,i)=>28+i).join(',')};BYSETPOS=-1`; // 31 -> last day in short months
    const summary=esc((t.description||catOf(t.category).label)+' due · '+money(t.amount));
    lines.push('BEGIN:VEVENT',
      `UID:${t.id}@tally`,
      `DTSTAMP:${stamp}`,
      `DTSTART:${first.getFullYear()}${pad(first.getMonth()+1)}${pad(first.getDate())}T090000`,
      `RRULE:${rrule}`,
      `SUMMARY:${summary}`,
      `DESCRIPTION:${esc(memberName(t.paidBy)+' pays · '+splitSummary(t.amount,t.split,t.paidBy)+' · from Tally')}`,
      'BEGIN:VALARM','ACTION:DISPLAY',`DESCRIPTION:${summary}`,'TRIGGER:-PT0M','END:VALARM',
      'BEGIN:VALARM','ACTION:DISPLAY',`DESCRIPTION:${esc('Tomorrow: ')+summary}`,'TRIGGER:-P1D','END:VALARM',
      'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const a=h('a',{href:URL.createObjectURL(blob),download:'tally-bills.ics'}); a.click();
  toast('Calendar file downloaded — open it to add the alerts');
}
function importData(){
  const inp=h('input',{type:'file',accept:'application/json,.json',style:{display:'none'}});
  inp.addEventListener('change',()=>{
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=async()=>{
      try{
        const d=JSON.parse(r.result);
        if(!d.transactions){ toast('That doesn\'t look like a Tally backup.'); return; }
        if(!confirm('Import '+Object.keys(d.transactions).length+' transactions? This merges into your current data.')) return;
        // in local mode, adopt the backup's names/currency so labels & amounts round-trip
        if(d.meta && !isCloud()){
          if(d.meta.members) config.members=d.meta.members;
          if(d.meta.currency) config.currency=d.meta.currency;
          state.meta={members:config.members,currency:config.currency}; saveConfig();
        }
        if(d.skipRecurring){ state.skipRecurring=Object.assign(state.skipRecurring||{}, d.skipRecurring); if(!isCloud()) localPersist(); }
        for(const [id,t] of Object.entries(d.transactions)){ await persistTransaction(t, d.receipts&&d.receipts[id]!==undefined?d.receipts[id]:undefined); }
        for(const [id,t] of Object.entries(d.recurring||{})){ await persistRecurring(t); }
        toast('Imported ✓'); render();
      }catch(e){ toast('Couldn\'t read that file.'); }
    };
    r.readAsText(f);
  });
  inp.click();
}

/* ================================================================
   date / misc helpers
   ================================================================ */
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDate(s){ if(!s) return ''; const [y,m,dd]=s.split('-').map(Number); const d=new Date(y,m-1,dd);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function fmtMonth(ym){ if(!ym) return ''; const [y,m]=ym.split('-').map(Number); const d=new Date(y,m-1,1);
  return d.toLocaleDateString(undefined,{month:'long',year:'numeric'}); }
function shiftMonth(ym,delta){ let [y,m]=ym.split('-').map(Number); m+=delta; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} return `${y}-${String(m).padStart(2,'0')}`; }
function rid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ================================================================
   BOOT
   ================================================================ */
async function boot(justOnboarded){
  loadConfig();
  applyTheme();
  showLock();   // no-op unless a PIN is set on this device
  if(!config){ renderOnboarding(); return; }
  if(isCloud()){
    try{
      app.innerHTML='<div class="spin"></div>';
      await cloudConnect();       // listeners will call afterData()->render()
    }catch(e){
      console.error(e);
      app.innerHTML='';
      toast('Couldn\'t connect to Firebase — check config. Using local mode for now.');
      // fall back to local data view
      localLoad(); afterData();
    }
  } else {
    localLoad(); afterData();
  }
  render();   // render() auto-picks the device person, or shows the picker if it can't
}

if(window.matchMedia){ try{ window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{ if(((config&&config.theme)||'auto')==='auto') applyTheme(); }); }catch(e){} }
// re-lock after 5 min in the background
let hiddenAt=0;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden) hiddenAt=Date.now();
  else if(config&&config.pin&&hiddenAt&&Date.now()-hiddenAt>5*60*1000) showLock();
});
window.addEventListener('DOMContentLoaded', ()=>boot(false));
</script>
